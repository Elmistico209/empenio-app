<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Casa de Empeño — Registro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
    header{background:#1a1a2e;color:#fff;padding:0 32px;display:flex;align-items:stretch;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .header-left{display:flex;flex-direction:column;justify-content:center;padding:16px 0}
    header h1{font-size:1.3rem;font-weight:600;letter-spacing:.5px}
    .header-tabs{display:flex;align-items:flex-end;gap:4px}
    .tab-btn{padding:12px 24px;border:none;background:transparent;color:#8892b0;font-size:.9rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:.3px}
    .tab-btn:hover{color:#fff}
    .tab-btn.active{color:#fff;border-bottom-color:#4f6ef7}
    .header-right{display:flex;align-items:center}
    .sync-status{font-size:.8rem;padding:5px 12px;border-radius:20px;font-weight:600}
    .sync-ok{background:#166534;color:#bbf7d0}
    .sync-off{background:#7f1d1d;color:#fecaca}
    .sync-load{background:#1e3a5f;color:#bfdbfe}
    .tab-section{display:none}
    .tab-section.active{display:block}
    .container{max-width:1200px;margin:0 auto;padding:28px 20px}
    .card{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:24px;margin-bottom:24px}
    .card-title{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:16px}
    .adjust-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .adjust-row label{font-size:.9rem;font-weight:500}
    .adjust-row input{width:120px;padding:8px 10px;border:1.5px solid #d0d5dd;border-radius:6px;font-size:.95rem}
    .next-code-badge{font-size:.85rem;color:#555;background:#f0f2f5;padding:6px 12px;border-radius:20px}
    .next-code-badge strong{color:#1a1a2e}
    .form-grid{display:grid;grid-template-columns:155px 120px 1fr 155px 130px;gap:12px;align-items:end}
    @media(max-width:900px){.form-grid{grid-template-columns:1fr 1fr}}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group label{font-size:.82rem;font-weight:600;color:#444}
    .form-group input,.form-group select{padding:9px 11px;border:1.5px solid #d0d5dd;border-radius:6px;font-size:.93rem;transition:border-color .2s;background:#fff}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:#4f6ef7}
    .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.78rem;font-weight:700}
    .badge-oro{background:#fef3c7;color:#92400e}
    .badge-plata{background:#f1f5f9;color:#475569}
    .badge-otro{background:#ede9fe;color:#5b21b6}
    .btn{padding:9px 20px;border:none;border-radius:6px;font-size:.88rem;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;white-space:nowrap}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:#4f6ef7;color:#fff}
    .btn-primary:hover{background:#3a55d4}
    .btn-dark{background:#1a1a2e;color:#fff}
    .btn-dark:hover{background:#2d2d5e}
    .btn-green{background:#16a34a;color:#fff}
    .btn-green:hover{background:#15803d}
    .btn-del{background:none;border:1.5px solid #e53e3e;color:#e53e3e;border-radius:5px;padding:4px 10px;cursor:pointer;font-size:.78rem;font-weight:600;transition:background .15s,color .15s}
    .btn-del:hover{background:#e53e3e;color:#fff}
    .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
    .toolbar-info{font-size:.9rem;color:#666}
    .toolbar-info strong{color:#1a1a2e}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.88rem}
    thead tr{background:#1a1a2e;color:#fff}
    thead th{padding:11px 12px;text-align:left;font-weight:600;letter-spacing:.3px}
    tbody tr{border-bottom:1px solid #eee;transition:background .15s}
    tbody tr:hover{background:#f7f8ff}
    tbody td{padding:9px 12px}
    .td-code{font-weight:700;color:#4f6ef7;font-family:monospace;font-size:.95rem}
    .td-amount{font-weight:600;color:#16a34a}
    .empty-state{text-align:center;padding:40px;color:#aaa}
    .stats-banner{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
    .stat-box{flex:1;min-width:130px;background:#f8faff;border:1.5px solid #e0e7ff;border-radius:8px;padding:14px 18px}
    .stat-box .stat-val{font-size:1.35rem;font-weight:800;color:#1a1a2e}
    .stat-box .stat-lbl{font-size:.75rem;color:#888;margin-top:2px}
    .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    @media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
    .chart-card{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:20px;margin-bottom:20px}
    .chart-card:last-child{margin-bottom:0}
    .chart-title{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:14px}
    .chart-wrap{position:relative;height:280px}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .filter-btn{padding:5px 14px;border:1.5px solid #d0d5dd;border-radius:20px;background:#fff;font-size:.8rem;cursor:pointer;font-weight:600;color:#555;transition:all .2s}
    .filter-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
    .loading-overlay{position:fixed;inset:0;background:rgba(26,26,46,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;gap:16px;font-size:1.1rem;font-weight:600}
    .spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

<div class="loading-overlay" id="loadingOverlay">

<header>
  <div class="header-left">

    <h1>Casa de Empeño</h1>
  </div>
  <div class="header-tabs">
    <button class="tab-btn active" onclick="switchTab('registros')">Registros</button>
    <button class="tab-btn" onclick="switchTab('estadisticas')">Estadisticas</button>
  </div>
  <div class="header-right">
    <span class="sync-status sync-load" id="syncStatus">Conectando...</span>
  </div>
</header>

<div class="container">

  <div class="tab-section active" id="tab-registros">

  <div class="card">
    <div class="card-title">Ajuste de Código Inicial</div>
    <div class="adjust-row">
      <label for="adjustInput">Establecer código desde:</label>
      <input type="number" id="adjustInput" placeholder="Ej. 4220" min="1"/>
      <button class="btn btn-dark" onclick="applyAdjust()">Aplicar</button>
      <span class="next-code-badge">Próximo código: <strong id="nextCodeDisplay">—</strong></span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Nuevo Registro</div>
    <div class="form-grid">
      <div class="form-group">
        <label for="fFecha">Fecha</label>
        <input type="date" id="fFecha"/>
      </div>
      <div class="form-group">
        <label for="fCodigo">Código</label>
        <input type="text" id="fCodigo" placeholder="Auto"/>
      </div>
      <div class="form-group">
        <label for="fNombre">Nombre del cliente</label>
        <input type="text" id="fNombre" placeholder="Ej. María García López"/>
      </div>
      <div class="form-group">
        <label for="fCantidad">Monto ($)</label>
        <input type="number" id="fCantidad" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label for="fTipo">Tipo de artículo</label>
        <select id="fTipo">
          <option value="oro">Oro</option>
          <option value="plata">Plata</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <div style="margin-top:14px">
      <button class="btn btn-primary" id="btnAgregar" onclick="addRecord()">+ Agregar Registro</button>
    </div>
  </div>

  <div class="card">
    <div class="toolbar">
      <span class="toolbar-info">Total: <strong id="totalCount">0</strong> registros &nbsp;|&nbsp; Prestado: <strong id="totalAmount">$0</strong></span>
      <button class="btn btn-green" onclick="exportCSV()">Exportar CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Fecha</th><th>Código</th><th>Cliente</th><th>Tipo</th><th>Monto</th><th></th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  </div> <!-- fin tab-registros -->

  <div class="tab-section" id="tab-estadisticas">
  <div class="card">
    <div class="stats-banner" id="statsBanner"></div>
    <div class="chart-card">
      <div class="chart-title">Monto total prestado por mes</div>
      <div class="filter-row" id="yearFilters"></div>
      <div class="chart-wrap"><canvas id="chartMeses"></canvas></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Distribución por tipo de artículo</div>
        <div class="chart-wrap"><canvas id="chartTipo"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Clientes por rango de monto</div>
        <div class="chart-wrap"><canvas id="chartRangos"></canvas></div>
      </div>
    </div>
  </div>
  </div> <!-- fin tab-estadisticas -->

</div>

  const SEED_NEXT_CODE = 4220;

  let records  = [];
  let nextCode = SEED_NEXT_CODE;
  let chartMeses = null, chartTipo = null, chartRangos = null;
  let activeYear = 'todos';
  let dbReady = false;

  // ── Cargar nextCode desde Firestore ──
  async function loadMeta() {
    const metaRef = doc(db, 'meta', 'config');
    const snap    = await getDoc(metaRef);
    if (snap.exists()) {
      nextCode = snap.data().nextCode || SEED_NEXT_CODE;
    } else {
      // Primera vez: subir seed data
      await setDoc(metaRef, { nextCode: SEED_NEXT_CODE });
      nextCode = SEED_NEXT_CODE;
      // Subir los registros semilla
      setSyncStatus('load', 'Importando datos del Excel...');
      const col = collection(db, 'registros');
      for (const r of SEED_RECORDS) {
        await addDoc(col, r);
      }
    }
    syncNextCodeToForm();
  }

  // ── Escuchar cambios en tiempo real ──
  function listenRecords() {
    onSnapshot(collection(db, 'registros'), (snapshot) => {
      records = snapshot.docs.map(d => ({ _fireId: d.id, ...d.data() }));
      records.sort((a,b) => parseInt(b.codigo) - parseInt(a.codigo));
      renderTable();
      buildYearFilters();
      renderCharts();
      document.getElementById('loadingOverlay').style.display = 'none';
      setSyncStatus('ok', 'Sincronizado');
      dbReady = true;
    }, (err) => {
      setSyncStatus('off', 'Sin conexión');
      console.error(err);
    });
  }

  function setSyncStatus(type, text) {
    const el = document.getElementById('syncStatus');
    el.textContent = text;
    el.className = 'sync-status sync-' + type;
  }

  function syncNextCodeToForm() {
    document.getElementById('fCodigo').value = nextCode;
    document.getElementById('nextCodeDisplay').textContent = nextCode;
  }

  async function saveMeta() {
    await setDoc(doc(db, 'meta', 'config'), { nextCode });
  }

  // ── Ajuste ──
  window.applyAdjust = async function() {
    const val = parseInt(document.getElementById('adjustInput').value);
    if (!val || val < 1) { alert('Ingresa un número válido.'); return; }
    nextCode = val;
    await saveMeta();
    syncNextCodeToForm();
    document.getElementById('adjustInput').value = '';
  };

  // ── Agregar ──
  window.addRecord = async function() {
    if (!dbReady) { alert('Espera a que conecte con la base de datos.'); return; }
    const fecha     = document.getElementById('fFecha').value.trim();
    const codigoRaw = document.getElementById('fCodigo').value.trim();
    const nombre    = document.getElementById('fNombre').value.trim();
    const cantidad  = parseFloat(document.getElementById('fCantidad').value);
    const tipo      = document.getElementById('fTipo').value;
    if (!fecha)                          { alert('Ingresa una fecha.');       return; }
    if (!codigoRaw)                      { alert('El código está vacío.');    return; }
    if (!nombre)                         { alert('Ingresa el nombre.');       return; }
    if (isNaN(cantidad) || cantidad < 0) { alert('Ingresa un monto válido.'); return; }

    const codigoNum = parseInt(codigoRaw);
    if (!isNaN(codigoNum) && codigoNum !== nextCode) nextCode = codigoNum;

    const btn = document.getElementById('btnAgregar');
    btn.disabled = true; btn.textContent = 'Guardando...';

    await addDoc(collection(db, 'registros'), { fecha, codigo: codigoRaw, nombre, cantidad, tipo });
    nextCode += 1;
    await saveMeta();
    syncNextCodeToForm();

    document.getElementById('fNombre').value   = '';
    document.getElementById('fCantidad').value = '';
    btn.disabled = false; btn.textContent = '+ Agregar Registro';
    document.getElementById('fNombre').focus();
  };

  // ── Borrar ──
  window.deleteRecord = async function(fireId) {
    if (!confirm('¿Eliminar este registro?')) return;
    await deleteDoc(doc(db, 'registros', fireId));
  };

  // ── Tabla ──
  function renderTable() {
    const total = records.reduce((s,r) => s+(r.cantidad||0), 0);
    const oro   = records.filter(r => r.tipo==='oro').length;
    const plata = records.filter(r => r.tipo==='plata').length;
    const otro  = records.filter(r => (r.tipo||'otro')==='otro').length;
    document.getElementById('totalCount').textContent  = records.length;
    document.getElementById('totalAmount').textContent = formatMoney(total);
    document.getElementById('statsBanner').innerHTML = `
      <div class="stat-box"><div class="stat-val">${records.length}</div><div class="stat-lbl">Registros totales</div></div>
      <div class="stat-box"><div class="stat-val">${formatMoney(total)}</div><div class="stat-lbl">Total prestado</div></div>
      <div class="stat-box"><div class="stat-val">${oro}</div><div class="stat-lbl">Artículos Oro</div></div>
      <div class="stat-box"><div class="stat-val">${plata}</div><div class="stat-lbl">Artículos Plata</div></div>
      <div class="stat-box"><div class="stat-val">${otro}</div><div class="stat-lbl">Otros artículos</div></div>`;
    const tbody = document.getElementById('tableBody');
    if (!records.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Sin registros aún.</td></tr>';
      return;
    }
    tbody.innerHTML = records.map((r,i) => `
      <tr>
        <td>${i+1}</td>
        <td>${formatDate(r.fecha)}</td>
        <td class="td-code">${escHtml(r.codigo)}</td>
        <td>${escHtml(r.nombre)}</td>
        <td><span class="badge badge-${r.tipo||'otro'}">${labelTipo(r.tipo)}</span></td>
        <td class="td-amount">${formatMoney(r.cantidad)}</td>
        <td><button class="btn-del" onclick="deleteRecord('${r._fireId}')">Borrar</button></td>
      </tr>`).join('');
  }

  // ── Exportar ──
  window.exportCSV = function() {
    if (!records.length) { alert('No hay registros.'); return; }
    const BOM  = '\uFEFF';
    const rows = records.map((r,i) =>
      [i+1, r.fecha, r.codigo, `"${(r.nombre||'').replace(/"/g,'""')}"`, labelTipo(r.tipo), r.cantidad].join(','));
    const a = document.createElement('a');
    a.href  = URL.createObjectURL(new Blob([BOM+['#,Fecha,Codigo,Cliente,Tipo,Monto',...rows].join('\n')],{type:'text/csv;charset=utf-8;'}));
    a.download = `empenio_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  };

  // ── Charts ──
  function buildYearFilters() {
    const years = [...new Set(records.map(r=>r.fecha?r.fecha.slice(0,4):null).filter(Boolean))].sort();
    document.getElementById('yearFilters').innerHTML =
      ['todos',...years].map(y =>
        `<button class="filter-btn ${activeYear===y?'active':''}" onclick="setYear('${y}')">${y==='todos'?'Todos':y}</button>`
      ).join('');
  }

  window.setYear = function(y) { activeYear=y; buildYearFilters(); renderChartMeses(); };
  function renderCharts() { renderChartMeses(); renderChartTipo(); renderChartRangos(); }

  function renderChartMeses() {
    const src = activeYear==='todos' ? records : records.filter(r=>r.fecha&&r.fecha.startsWith(activeYear));
    const map = {};
    src.forEach(r => {
      if (!r.fecha) return;
      const k = r.fecha.slice(0,7);
      if (!map[k]) map[k]={total:0,count:0};
      map[k].total += r.cantidad||0; map[k].count++;
    });
    const keys  = Object.keys(map).sort();
    const mN    = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const lbls  = keys.map(k=>{ const[y,m]=k.split('-'); return mN[+m-1]+' '+y; });
    if (chartMeses) chartMeses.destroy();
    chartMeses = new Chart(document.getElementById('chartMeses'),{
      type:'bar',
      data:{labels:lbls,datasets:[
        {label:'Monto ($)',data:keys.map(k=>map[k].total),backgroundColor:'rgba(79,110,247,.7)',borderColor:'#4f6ef7',borderWidth:1.5,yAxisID:'y'},
        {label:'Registros',data:keys.map(k=>map[k].count),type:'line',borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.12)',borderWidth:2,pointRadius:3,yAxisID:'y1'}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top'}},
        scales:{
          y:{type:'linear',position:'left',ticks:{callback:v=>'$'+v.toLocaleString('es-MX')}},
          y1:{type:'linear',position:'right',grid:{drawOnChartArea:false},ticks:{stepSize:1}}
        }}
    });
  }

  function renderChartTipo() {
    const map={oro:0,plata:0,otro:0};
    records.forEach(r=>{ const t=r.tipo||'otro'; map[t]=(map[t]||0)+1; });
    if (chartTipo) chartTipo.destroy();
    chartTipo = new Chart(document.getElementById('chartTipo'),{
      type:'doughnut',
      data:{labels:['Oro','Plata','Otro'],
        datasets:[{data:[map.oro,map.plata,map.otro],backgroundColor:['#f59e0b','#94a3b8','#818cf8'],borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom'},
          tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+ctx.parsed+' ('+Math.round(ctx.parsed/records.length*100)+'%)'}}}}
    });
  }

  function renderChartRangos() {
    const rangos=[
      {label:'$1 – $500',min:1,max:500},{label:'$501 – $1,000',min:501,max:1000},
      {label:'$1,001 – $2,000',min:1001,max:2000},{label:'$2,001 – $5,000',min:2001,max:5000},
      {label:'$5,001 – $10,000',min:5001,max:10000},{label:'$10,001+',min:10001,max:Infinity}
    ];
    const counts=rangos.map(rng=>records.filter(r=>r.cantidad>=rng.min&&r.cantidad<=rng.max).length);
    if (chartRangos) chartRangos.destroy();
    chartRangos = new Chart(document.getElementById('chartRangos'),{
      type:'bar',
      data:{labels:rangos.map(r=>r.label),
        datasets:[{label:'Clientes',data:counts,backgroundColor:['#6ee7b7','#34d399','#10b981','#059669','#047857','#065f46'],borderWidth:0}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},scales:{x:{ticks:{stepSize:1}}}}
    });
  }

  function labelTipo(t){ return {oro:'Oro',plata:'Plata',otro:'Otro'}[t]||'Otro'; }
  function formatDate(iso){ if(!iso)return''; const[y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
  function formatMoney(n){ return '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  window.switchTab = function(tab) {
    document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => {
      if (b.textContent.toLowerCase().includes(tab === 'registros' ? 'registro' : 'stadis')) b.classList.add('active');
    });
    if (tab === 'estadisticas') renderCharts();
  };

  document.getElementById('fFecha').value = new Date().toISOString().split('T')[0];
  ['fFecha','fCodigo','fNombre','fCantidad'].forEach(id=>
    document.getElementById(id).addEventListener('keydown',e=>{ if(e.key==='Enter') window.addRecord(); })
  );

  await loadMeta();
  listenRecords();
</script>
